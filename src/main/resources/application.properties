spring.application.name=eduux-feedback-system

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/eduux_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_new_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=eduux-super-secret-key-change-this-in-production-2024
jwt.expiration=86400000

# Server
server.port=8080